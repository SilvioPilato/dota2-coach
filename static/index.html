<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dota 2 Personal Coach</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app-shell">

    <!-- Top bar -->
    <div class="top-bar">
      <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="Toggle sidebar">&#9776;</button>
      <div class="top-bar-center">
        <div class="input-bar">
          <input type="text" id="matchId" placeholder="Match ID (e.g. 7823456789)">
          <input type="text" id="playerId" placeholder="Player ID (optional)" style="max-width:220px">
          <button id="analyzeBtn" onclick="runAnalysis()">Analyze</button>
          <button id="reanalyzeBtn" style="display:none" onclick="runAnalysis(getCurrentRole(), {force_reanalyze: true})">Re-analyze</button>
          <button id="redownloadBtn" style="display:none" onclick="runAnalysis(getCurrentRole(), {force_redownload: true})">Re-download replay</button>
        </div>
        <div id="lastAccountLabel" style="display:none">
          Last account: <span id="lastAccountId"></span>
          <button onclick="dismissLastAccount()">×</button>
        </div>
      </div>
      <button class="chat-toggle" id="chatToggleBtn" onclick="toggleChat()" aria-label="Toggle chat">&#128172;</button>
    </div>

    <!-- Workspace -->
    <div class="workspace">

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">Recent Matches</div>
        <div class="sidebar-list" id="sidebarList">
          <div class="sidebar-empty" id="sidebarEmpty" style="display:none">No recent matches found</div>
          <div class="sidebar-error" id="sidebarError" style="display:none">Could not load matches — check Player ID</div>
        </div>
      </aside>

      <!-- Report pane -->
      <div class="report-pane">
        <div class="stepper" id="stepper" style="display:none"></div>
        <div class="stepper-summary" id="stepperSummary" style="display:none"></div>
        <div class="error-banner" id="errorBanner"></div>

        <!-- Report section (hidden until results arrive) -->
        <div class="report" id="report">

          <!-- Match header -->
          <div class="match-header">
            <span class="hero-name" id="heroName"></span>
            <span class="badge badge-role" id="roleBadge"></span>
            <span class="badge" id="resultBadge"></span>
            <span id="duration"></span>
            <span class="badge badge-patch" id="patchTag"></span>
            <div class="role-override">
              <select id="roleOverride" onchange="rerunWithRole()">
                <option value="">Detected role</option>
                <option value="1">Pos 1 — Carry</option>
                <option value="2">Pos 2 — Mid</option>
                <option value="3">Pos 3 — Offlaner</option>
                <option value="4">Pos 4 — Soft Support</option>
                <option value="5">Pos 5 — Hard Support</option>
              </select>
            </div>
          </div>

          <!-- Metric cards -->
          <div class="metric-cards" id="metricCards"></div>

          <!-- Two-column: stats + benchmarks -->
          <div class="two-col">
            <div class="panel" id="statsPanel">
              <h3>Laning &amp; Role Details</h3>
              <div id="statRows"></div>
            </div>
            <div class="panel" id="benchPanel">
              <h3>Percentile Benchmarks</h3>
              <div id="benchRows"></div>
            </div>
          </div>

          <!-- Coaching report -->
          <h2 class="section-title">Coaching Report</h2>
          <div id="mistakeBlocks"></div>

          <!-- Priority focus -->
          <div class="priority-focus" id="priorityFocus" style="display:none">
            <h3>&#9733; Priority Focus</h3>
            <p id="priorityText"></p>
          </div>

          <!-- Match timeline -->
          <div id="timelineSection" style="display:none">
            <h2 class="section-title">Match Timeline</h2>
            <div id="timelineRows" class="timeline"></div>
          </div>

        </div>
      </div>

      <!-- Chat pane -->
      <div class="chat-pane" id="chatPane">
        <div class="chat-pane-header">
          <span id="chatTitle">Ask your Coach</span>
        </div>
        <div class="chat-panel" id="chatPanel">
          <div class="chat-empty-state" id="chatEmptyState">Run an analysis to start chatting with your coach.</div>
          <div class="chat-messages" id="chatMessages">
          </div>
          <div id="quotePreview" style="display:none" class="quote-preview">
            &#128204; <span id="quoteText"></span>
            <button class="quote-dismiss" onclick="clearQuote()">×</button>
          </div>
          <div class="chat-input-bar">
            <textarea id="chatInput" rows="1" placeholder="Ask a follow-up question…"></textarea>
            <button id="chatSendBtn" onclick="sendChat()">Send</button>
          </div>
        </div>
      </div>

    </div><!-- .workspace -->
  </div><!-- .app-shell -->

<script>
/* ------------------------------------------------------------------ */
/*  State                                                              */
/* ------------------------------------------------------------------ */
// Configure marked: treat single newlines as <br>, keep safe HTML
marked.use({ breaks: true });

function mdToHtml(text) {
  // Downgrade h1/h2 → h3 so LLM headings don't blow up inside chat bubbles
  const downgraded = text.replace(/^#{1,2} /gm, '### ');
  return marked.parse(downgraded);
}

let lastMatchId = '';
let lastPlayerId = '';
let matchReport = null;   // Full MatchReport JSON from /analyze
let chatHistory = [];     // Array of {role, content} turns
window.currentQuote = null;

// Sidebar pagination state
let sidebarOffset = 0;
let sidebarLoading = false;
let sidebarDone = false;
let sidebarObserver = null;
let sidebarAccountId = null;

/* ------------------------------------------------------------------ */
/*  Role-adaptive metric card definitions                              */
/* ------------------------------------------------------------------ */
const ROLE_CARDS = {
  1: [
    { label: 'GPM',          key: m => m.gpm },
    { label: 'LH @ 10',      key: m => m.lh_at_10 },
    { label: 'First Core',   key: m => m.first_core_item_minute != null ? m.first_core_item_minute.toFixed(1) + ' min' : '—' },
    { label: 'NW Δ @ 10',    key: m => (m.net_worth_at_10 - m.opponent_net_worth_at_10) },
  ],
  2: [
    { label: 'GPM',          key: m => m.gpm },
    { label: 'LH @ 10',      key: m => m.lh_at_10 },
    { label: 'First Core',   key: m => m.first_core_item_minute != null ? m.first_core_item_minute.toFixed(1) + ' min' : '—' },
    { label: 'XPM',          key: m => m.xpm },
  ],
  3: [
    { label: 'GPM',          key: m => m.gpm },
    { label: 'LH @ 10',      key: m => m.lh_at_10 },
    { label: 'Stacks',       key: m => m.stacks_created ?? 0 },
    { label: 'TF %',         key: m => m.teamfight_participation_rate != null ? (m.teamfight_participation_rate * 100).toFixed(0) + '%' : '—' },
  ],
  4: [
    { label: 'Wards',        key: m => m.ward_placements ?? 0 },
    { label: 'Stacks',       key: m => m.stacks_created ?? 0 },
    { label: 'Healing',      key: m => m.hero_healing ?? 0 },
    { label: 'TF %',         key: m => m.teamfight_participation_rate != null ? (m.teamfight_participation_rate * 100).toFixed(0) + '%' : '—' },
  ],
  5: [
    { label: 'Wards',        key: m => m.ward_placements ?? 0 },
    { label: 'Stacks',       key: m => m.stacks_created ?? 0 },
    { label: 'Healing',      key: m => m.hero_healing ?? 0 },
    { label: 'TF %',         key: m => m.teamfight_participation_rate != null ? (m.teamfight_participation_rate * 100).toFixed(0) + '%' : '—' },
  ],
};

/* ------------------------------------------------------------------ */
/*  Stepper                                                            */
/* ------------------------------------------------------------------ */
const PHASES = [
  { id: 'metadata', label: 'Fetching match data' },
  { id: 'download', label: 'Downloading replay' },
  { id: 'parse',    label: 'Parsing replay' },
  { id: 'enrich',   label: 'Enriching with benchmarks' },
  { id: 'llm',      label: 'Generating coaching report' },
];

function initStepper() {
  const el = document.getElementById('stepper');
  el.className = 'stepper';
  el.innerHTML = PHASES.map(p => `
    <div class="step-row" id="step-row-${p.id}">
      <span class="step-icon pending" id="step-icon-${p.id}"></span>
      <div class="step-body">
        <span class="step-label">${p.label}</span>
        <span class="step-detail" id="step-detail-${p.id}"></span>
      </div>
      <span class="step-time" id="step-time-${p.id}"></span>
    </div>
  `).join('');
  el.style.display = '';
  document.getElementById('stepperSummary').style.display = 'none';
}

function updateStep(phase, status, detail, phase_ms) {
  const icon = document.getElementById(`step-icon-${phase}`);
  const detailEl = document.getElementById(`step-detail-${phase}`);
  const timeEl = document.getElementById(`step-time-${phase}`);
  if (!icon) return;
  icon.className = `step-icon ${status}`;
  if (detail) detailEl.textContent = detail;
  if ((status === 'done' || status === 'error') && phase_ms != null) {
    timeEl.textContent = (phase_ms / 1000).toFixed(1) + 's';
  }
}

function collapseStepper(timings) {
  const el = document.getElementById('stepper');
  el.classList.add('stepper-collapsing');
  setTimeout(() => {
    el.style.display = 'none';
    el.classList.remove('stepper-collapsing');
    const summary = document.getElementById('stepperSummary');
    const parts = PHASES
      .filter(p => timings[p.id] != null)
      .map(p => `${p.label.split(' ')[0].toLowerCase()} ${(timings[p.id] / 1000).toFixed(1)}s`)
      .join(' · ');
    summary.textContent = parts ? `▸ ${parts}` : '';
    summary.style.display = parts ? '' : 'none';
  }, 350);
}

/* ------------------------------------------------------------------ */
/*  API call                                                           */
/* ------------------------------------------------------------------ */
async function runAnalysis(roleOverride = null, flags = {}) {
  const matchId = document.getElementById('matchId').value.trim();
  const playerId = document.getElementById('playerId').value.trim();
  if (!matchId) return;

  lastMatchId = matchId;
  lastPlayerId = playerId;

  // Check localStorage cache before hitting the server
  if (!flags.force_reanalyze && !flags.force_redownload) {
    const cacheKey = `dota_analysis_${matchId}_${playerId}`;
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      try { renderReport(JSON.parse(cached)); return; } catch {}
    }
  }

  // UI state: start streaming
  document.getElementById('report').classList.remove('visible');
  document.getElementById('errorBanner').classList.remove('visible');
  document.getElementById('analyzeBtn').disabled = true;
  initStepper();

  const body = { match_id: matchId };
  if (playerId) body.player_id = playerId;
  if (roleOverride) body.role_override = Number(roleOverride);
  if (flags.force_reanalyze)  body.force_reanalyze  = true;
  if (flags.force_redownload) body.force_redownload = true;

  const stepTimings = {};
  let currentEvent = '';

  try {
    const res = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          currentEvent = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          const payload = JSON.parse(line.slice(6));
          if (currentEvent === 'step') {
            updateStep(payload.phase, payload.status, payload.detail, payload.phase_ms);
            if (payload.status === 'done' && payload.phase_ms != null) {
              stepTimings[payload.phase] = payload.phase_ms;
            }
            if (payload.status === 'error') {
              showError(payload.message || 'Analysis failed');
              document.getElementById('stepper').style.display = 'none';
            }
          } else if (currentEvent === 'report') {
            localStorage.setItem(`dota_analysis_${matchId}_${playerId}`, JSON.stringify(payload));
            collapseStepper(stepTimings);
            renderReport(payload);
            if (playerId) {
              localStorage.setItem('dota_coach_account_id', playerId);
              document.getElementById('lastAccountId').textContent = playerId;
              document.getElementById('lastAccountLabel').style.display = '';
              loadSidebar(playerId);
            }
          }
          currentEvent = '';
        }
      }
    }
  } catch (e) {
    showError(e.message);
    document.getElementById('stepper').style.display = 'none';
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
  }
}

function getCurrentRole() {
  const v = document.getElementById('roleOverride').value;
  return v ? Number(v) : null;
}

function rerunWithRole() {
  const sel = document.getElementById('roleOverride').value;
  if (sel && lastMatchId) runAnalysis(Number(sel));
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.classList.add('visible');
}

/* ------------------------------------------------------------------ */
/*  Render helpers                                                     */
/* ------------------------------------------------------------------ */
function renderReport(d) {
  // Store report for chat context & reset chat
  matchReport = d;
  chatHistory = [];
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('chatEmptyState').style.display = 'none';

  // Header
  document.getElementById('heroName').textContent = d.hero;
  const roleBadge = document.getElementById('roleBadge');
  roleBadge.textContent = `Pos ${d.role} — ${d.role_label}`;
  const rb = document.getElementById('resultBadge');
  rb.textContent = d.result.toUpperCase();
  rb.className = 'badge ' + (d.result === 'win' ? 'badge-win' : 'badge-loss');
  document.getElementById('duration').textContent = `${d.duration_minutes.toFixed(0)} min`;
  document.getElementById('patchTag').textContent = d.patch || '';
  document.getElementById('roleOverride').value = '';
  document.getElementById('reanalyzeBtn').style.display = '';
  document.getElementById('redownloadBtn').style.display = '';

  // Turbo badge
  let turboEl = document.getElementById('turboBadge');
  if (!turboEl) {
    turboEl = document.createElement('span');
    turboEl.id = 'turboBadge';
    turboEl.className = 'badge badge-turbo';
    document.querySelector('.match-header').appendChild(turboEl);
  }
  turboEl.textContent = d.turbo ? '⚡ TURBO' : '';
  turboEl.style.display = d.turbo ? '' : 'none';

  // Degraded mode banner
  let degradedBanner = document.getElementById('degradedBanner');
  if (!degradedBanner) {
    degradedBanner = document.createElement('div');
    degradedBanner.id = 'degradedBanner';
    degradedBanner.className = 'degraded-banner';
    degradedBanner.textContent = '⚠ Replay unavailable — analysis is based on OpenDota data only. ' +
      'Some metrics (deaths before 10, CS heatmap, item timings) are not available in this mode.';
    document.getElementById('report').insertBefore(degradedBanner, document.getElementById('report').firstChild);
  }
  degradedBanner.style.display = d.degraded ? '' : 'none';

  // Metric cards
  const cards = ROLE_CARDS[d.role] || ROLE_CARDS[1];
  const mc = document.getElementById('metricCards');
  mc.innerHTML = cards.map(c =>
    `<div class="metric-card"><div class="label">${c.label}</div><div class="value">${c.key(d.metrics)}</div></div>`
  ).join('');

  // Stats panel
  const m = d.metrics;
  const stats = [
    ['LH @ 10', m.lh_at_10],
    ['Denies @ 10', m.denies_at_10],
    ['Deaths < 10 min', m.deaths_before_10],
    ['NW @ 10', m.net_worth_at_10?.toLocaleString() ?? '—'],
    ['GPM', m.gpm],
    ['XPM', m.xpm],
    ['TF Participation', m.teamfight_participation_rate != null ? (m.teamfight_participation_rate * 100).toFixed(0) + '%' : '—'],
    ['Ward Purchases', m.ward_purchases],
  ];
  document.getElementById('statRows').innerHTML = stats.map(([k, v]) =>
    `<div class="stat-row"><span>${k}</span><span>${v}</span></div>`
  ).join('');

  // Benchmarks
  const bch = document.getElementById('benchRows');
  if (d.turbo) {
    bch.innerHTML = '<div class="turbo-notice">&#9889; Turbo mode &mdash; percentile benchmarks not available for this game mode.<br><span style="color:var(--text-muted);font-size:13px">Coaching is based on absolute metrics and Turbo-specific reference values.</span></div>';
  } else if (d.benchmarks && d.benchmarks.length) {
    bch.innerHTML = d.benchmarks.map(b => {
      const pct = Math.round(b.player_pct * 100);
      return `<div class="bench-row">
        <div class="bench-label"><span>${fmtBenchName(b.metric)}</span><span>${pct}%</span></div>
        <div class="bench-bar"><div class="bench-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
  } else {
    bch.innerHTML = '<p style="color:var(--text-muted)">No benchmark data</p>';
  }

  // Coaching report — parse MISTAKE blocks
  renderMistakes(d.coaching_report, d.errors);

  // Priority focus
  const pf = document.getElementById('priorityFocus');
  const pfText = d.priority_focus || extractPriorityFocus(d.coaching_report);
  if (pfText) {
    document.getElementById('priorityText').textContent = pfText;
    pf.style.display = '';
  } else {
    pf.style.display = 'none';
  }

  // Timeline
  renderTimeline(d.timeline || '');

  document.getElementById('report').classList.add('visible');
}

function renderTimeline(timelineStr) {
  const section = document.getElementById('timelineSection');
  const container = document.getElementById('timelineRows');

  if (!timelineStr) {
    section.style.display = 'none';
    return;
  }

  const lines = timelineStr.split('\n');
  // Skip the first line (header like "MATCH TIMELINE (Anti-Mage):")
  const eventLines = lines.slice(1).filter(l => l.trim());

  if (!eventLines.length) {
    section.style.display = 'none';
    return;
  }

  container.innerHTML = '';
  for (const line of eventLines) {
    // Parse "MM:SS — description"
    const match = line.match(/^(\d{2}:\d{2})\s*[—-]+\s*(.+)$/);
    if (!match) continue;

    const [, ts, desc] = match;

    const row = document.createElement('div');
    row.className = 'timeline-row';

    const tsSpan = document.createElement('span');
    tsSpan.className = 'timeline-ts';
    tsSpan.textContent = ts;

    const eventSpan = document.createElement('span');
    eventSpan.className = 'timeline-event' + (desc.includes('you died') ? ' timeline-death' : '');
    eventSpan.textContent = desc;

    const cite = document.createElement('button');
    cite.className = 'timeline-cite';
    cite.textContent = '→';
    cite.dataset.event = desc;

    cite.addEventListener('click', function() {
      const eventText = this.dataset.event;
      setQuote(eventText);

      // Highlight the row for 2s
      const row = this.closest('.timeline-row');
      row.classList.add('timeline-row-cited');
      setTimeout(() => row.classList.remove('timeline-row-cited'), 2000);

      // Focus textarea
      document.getElementById('chatInput').focus();
    });

    row.appendChild(tsSpan);
    row.appendChild(eventSpan);
    row.appendChild(cite);
    container.appendChild(row);
  }

  section.style.display = '';
}

function fmtBenchName(s) {
  return s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function renderMistakes(report, errors) {
  const container = document.getElementById('mistakeBlocks');
  // Try parsing MISTAKE lines from LLM output
  const blocks = parseMistakeBlocks(report);

  if (blocks.length) {
    container.innerHTML = blocks.map(b =>
      `<div class="mistake-block">
        <span class="sev sev-${b.severity}">${b.severity}</span>
        <div class="desc">${marked.parseInline(b.description)}</div>
        <div class="fix">&rarr; ${marked.parseInline(b.fix)}</div>
      </div>`
    ).join('');
  } else if (errors && errors.length) {
    // Fallback to structured errors from detector
    container.innerHTML = errors.slice(0, 3).map(e =>
      `<div class="mistake-block">
        <span class="sev sev-${e.severity}">${e.severity}</span>
        <div class="desc">${marked.parseInline(e.description)}</div>
        ${e.context ? `<div class="fix">&rarr; ${marked.parseInline(e.context)}</div>` : ''}
      </div>`
    ).join('');
  } else {
    container.innerHTML = '<p style="color:var(--text-muted)">No mistakes detected — nice game!</p>';
  }
}

function parseMistakeBlocks(text) {
  if (!text) return [];
  const blocks = [];
  const regex = /MISTAKE\s+\d+\s*\((\w+)\)\s*:\s*(.+?)(?:\n→\s*Fix:\s*(.+?))?(?=\nMISTAKE|\nPRIORITY|\n---|$)/gis;
  let m;
  while ((m = regex.exec(text)) !== null) {
    blocks.push({
      severity: m[1].toLowerCase(),
      description: m[2].trim(),
      fix: m[3] ? m[3].trim() : '',
    });
  }
  return blocks;
}

function extractPriorityFocus(text) {
  if (!text) return '';
  const m = text.match(/PRIORITY\s+FOCUS\s*:\s*(.+)/i);
  return m ? m[1].trim() : '';
}

/* ------------------------------------------------------------------ */
/*  Chat panel                                                         */
/* ------------------------------------------------------------------ */
function setQuote(eventText) {
  window.currentQuote = eventText;
  document.getElementById('quoteText').textContent = eventText;
  document.getElementById('quotePreview').style.display = '';
}

function clearQuote() {
  window.currentQuote = null;
  document.getElementById('quotePreview').style.display = 'none';
}

function appendChatBubble(role, text) {
  const el = document.createElement('div');
  el.className = 'chat-bubble chat-' + role;
  if (role === 'assistant' && text) {
    el.innerHTML = mdToHtml(text);
  } else {
    el.textContent = text;
  }
  document.getElementById('chatMessages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return el;
}

function initChatInput() {
  const ta = document.getElementById('chatInput');

  // Auto-resize: 1 row default, max 4 rows
  ta.addEventListener('input', function() {
    this.style.height = 'auto';
    const lineHeight = parseInt(getComputedStyle(this).lineHeight);
    const maxHeight = lineHeight * 4;
    this.style.height = Math.min(this.scrollHeight, maxHeight) + 'px';
  });

  // Enter sends, Shift+Enter inserts newline
  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendChat();
    }
  });
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || !matchReport) return;

  const quote = window.currentQuote || null;
  input.value = '';
  input.style.height = 'auto';  // reset height after clearing
  clearQuote();
  document.getElementById('chatSendBtn').disabled = true;
  document.getElementById('chatInput').disabled = true;

  // User bubble
  appendChatBubble('user', msg);
  chatHistory.push({ role: 'user', content: msg });

  // Streaming assistant bubble
  const bubble = appendChatBubble('assistant', '');
  bubble.classList.add('chat-streaming');

  const body = {
    match_context: matchReport,
    history: chatHistory.slice(0, -1), // history before this message
    user_message: msg,
    quote,
  };

  let fullText = '';
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6);
        if (payload === '[DONE]') continue;
        fullText += JSON.parse(payload);
        bubble.innerHTML = mdToHtml(fullText) + '<span class="cursor">▋</span>';
      }
      bubble.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
  } catch (e) {
    fullText = fullText || '(Error: ' + e.message + ')';
    bubble.innerHTML = marked.parse(fullText);
  }

  bubble.innerHTML = mdToHtml(fullText);
  bubble.classList.remove('chat-streaming');
  chatHistory.push({ role: 'assistant', content: fullText });
  document.getElementById('chatSendBtn').disabled = false;
  document.getElementById('chatInput').disabled = false;
  document.getElementById('chatInput').focus();
}

function loadSavedAccount() {
  const saved = localStorage.getItem('dota_coach_account_id');
  if (saved) {
    document.getElementById('playerId').value = saved;
    document.getElementById('lastAccountId').textContent = saved;
    document.getElementById('lastAccountLabel').style.display = '';
    loadSidebar(saved);
  }
}

function dismissLastAccount() {
  localStorage.removeItem('dota_coach_account_id');
  document.getElementById('lastAccountLabel').style.display = 'none';
}

/* ------------------------------------------------------------------ */
/*  Game type label                                                    */
/* ------------------------------------------------------------------ */
function gameTypeLabel(lobbyType, gameMode) {
  // Turbo (game_mode 23) supersedes lobby type entirely
  if (gameMode === 23) return 'Turbo';

  const LOBBY = { 7: 'Ranked', 0: 'Unranked' };
  const MODE  = { 2: 'CM', 5: 'Random', 8: 'All Random' };

  const lobbyLabel = LOBBY[lobbyType] ?? '';
  const modeLabel  = MODE[gameMode]   ?? '';

  if (lobbyLabel && modeLabel) return `${lobbyLabel} · ${modeLabel}`;
  if (lobbyLabel) return lobbyLabel;
  if (modeLabel)  return modeLabel;
  return '';
}

/* ------------------------------------------------------------------ */
/*  Sidebar                                                            */
/* ------------------------------------------------------------------ */
function buildMatchRow(m) {
  const expired  = !m.replay_available;
  const analyzed = m.analyzed;

  const stateClass = expired ? 'state-expired' : (analyzed ? 'state-analyzed' : 'state-ready');

  const initials = m.hero_name
    ? m.hero_name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase()
    : '??';

  const date     = new Date(m.start_time * 1000).toLocaleDateString();
  const mins     = Math.floor(m.duration_seconds / 60);
  const secs     = m.duration_seconds % 60;
  const duration = `${mins}:${secs.toString().padStart(2, '0')}`;
  const gt       = gameTypeLabel(m.lobby_type ?? 0, m.game_mode ?? 0);
  const metaLine = `${date} · ${duration}${gt ? ' · ' + gt : ''}`;

  const row = document.createElement('div');
  row.className = `sidebar-row ${stateClass}${expired ? ' sidebar-expired' : ''}`;
  row.dataset.matchId       = m.match_id;
  row.dataset.heroName      = m.hero_name;
  row.dataset.analyzed      = m.analyzed;
  row.dataset.replayAvailable = m.replay_available;

  row.innerHTML = `
    <div class="sidebar-avatar">${initials}</div>
    <div class="sidebar-info">
      <div class="sidebar-hero">${m.hero_name || 'Unknown'}</div>
      <div class="sidebar-meta">${metaLine}</div>
    </div>
    <div class="sidebar-badge-wrap">
      <span class="sidebar-badge ${m.won ? 'badge-win' : 'badge-loss'}">${m.won ? 'W' : 'L'}</span>
      ${!expired ? `<button class="sidebar-action" style="display:none">${analyzed ? 'Re-analyze' : 'Analyze'}</button>` : ''}
    </div>
    <span class="sidebar-dot"></span>
  `;

  // Hover behavior
  if (!expired) {
    const badge = row.querySelector('.sidebar-badge');
    const btn   = row.querySelector('.sidebar-action');
    row.addEventListener('mouseenter', () => { badge.style.display = 'none'; btn.style.display = ''; });
    row.addEventListener('mouseleave', () => { badge.style.display = '';    btn.style.display = 'none'; });
  }

  // Click to view cached report
  if (analyzed && !expired) {
    row.addEventListener('click', async function(e) {
      if (e.target.classList.contains('sidebar-action')) return;
      const pid      = localStorage.getItem('dota_coach_account_id') || lastPlayerId || '';
      const cacheKey = `dota_analysis_${m.match_id}_${pid}`;
      const cached   = localStorage.getItem(cacheKey);
      if (cached) { try { renderReport(JSON.parse(cached)); return; } catch {} }
      try {
        const res = await fetch(`/report/${pid}/${m.match_id}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const report = await res.json();
        localStorage.setItem(cacheKey, JSON.stringify(report));
        renderReport(report);
      } catch (err) { console.error('Failed to load report from server:', err); }
    });
  }

  // Analyze button
  if (!expired) {
    const btn = row.querySelector('.sidebar-action');
    if (btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        document.getElementById('matchId').value = m.match_id;
        if (analyzed) { runAnalysis(null, { force_reanalyze: true }); }
        else           { runAnalysis(); }
      });
    }
  }

  return row;
}

async function loadSidebar(accountId) {
  // Tear down any previous observer to prevent stale account triggering loads
  if (sidebarObserver) { sidebarObserver.disconnect(); sidebarObserver = null; }

  // Reset pagination state
  sidebarOffset    = 0;
  sidebarLoading   = false;
  sidebarDone      = false;
  sidebarAccountId = accountId;

  const list    = document.getElementById('sidebarList');
  const emptyEl = document.getElementById('sidebarEmpty');
  const errorEl = document.getElementById('sidebarError');

  // Clear existing rows, keep placeholder divs
  Array.from(list.children).forEach(c => {
    if (!c.id || (c.id !== 'sidebarEmpty' && c.id !== 'sidebarError')) c.remove();
  });
  emptyEl.style.display = 'none';
  errorEl.style.display = 'none';

  // Insert sentinel at the bottom
  const sentinel = document.createElement('div');
  sentinel.id = 'sidebarSentinel';
  sentinel.style.cssText = 'height:1px;display:flex;align-items:center;justify-content:center;padding:8px 0;';
  list.appendChild(sentinel);

  // Observe sentinel to trigger next-page loads
  sidebarObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadSidebarPage(sidebarAccountId);
  }, { root: list, threshold: 0.1 });
  sidebarObserver.observe(sentinel);

  // Load first page immediately
  await loadSidebarPage(accountId);
}

async function loadSidebarPage(accountId) {
  if (sidebarLoading || sidebarDone || accountId !== sidebarAccountId) return;

  sidebarLoading = true;
  const list     = document.getElementById('sidebarList');
  const emptyEl  = document.getElementById('sidebarEmpty');
  const sentinel = document.getElementById('sidebarSentinel');

  if (sentinel) sentinel.innerHTML = '<span style="font-size:12px;color:var(--text-muted)">Loading\u2026</span>';

  try {
    const res = await fetch(`/recent-matches/${accountId}?offset=${sidebarOffset}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const matches = await res.json();

    if (matches.length === 0 && sidebarOffset === 0) {
      // No matches at all
      emptyEl.style.display = '';
      sidebarDone = true;
      if (sidebarObserver) { sidebarObserver.disconnect(); sidebarObserver = null; }
      if (sentinel) sentinel.remove();
      return;
    }

    // Append rows before sentinel
    matches.forEach(m => {
      const row = buildMatchRow(m);
      if (sentinel) list.insertBefore(row, sentinel);
      else          list.appendChild(row);
    });

    if (matches.length < 20) {
      // Last page — no more data
      sidebarDone = true;
      if (sidebarObserver) { sidebarObserver.disconnect(); sidebarObserver = null; }
      if (sentinel) sentinel.remove();
    } else {
      sidebarOffset += 20;
      if (sentinel) sentinel.innerHTML = '';
      // If content doesn't yet overflow the container, the observer won't fire
      // on scroll — proactively load the next page.
      if (list.scrollHeight <= list.clientHeight) loadSidebarPage(accountId);
    }
  } catch (e) {
    if (sentinel) {
      sentinel.innerHTML = `
        <span style="font-size:12px;color:var(--text-muted)">Failed to load.
          <button onclick="loadSidebarPage('${accountId}')"
                  style="margin-left:4px;background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;">
            Retry
          </button>
        </span>`;
    }
  } finally {
    sidebarLoading = false;
  }
}
</script>
